# Workflow name (appears in GitHub UI)
name: CI Pipeline
# Trigger events: when should this workflow run?
on:
push:
branches: [ main ] # Run on pushes to main
pull_request:
branches: [ main ] # Run on PRs targeting main
# Jobs: units of work that run in parallel (unless dependencies specified)
jobs:
 # Job 1: Code quality checks
lint:
name: Code Linting
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v3
- name: Set up Python 3.11
uses: actions/setup-python@v4
with:
python-version: '3.11'
- name: Install flake8
 run: |
 python -m pip install --upgrade pip
 pip install flake8
- name: Lint with flake8
 run: |
 flake8 app/files/app --count --select=E9,F63,F7,F82 --show-source --statistics
 flake8 app/files/app --count --max-line-length=120 --statistics
 # Job 2: Run test suite
test:
name: Run Tests
runs-on: ubuntu-latest
needs: lint
steps:
- name: Checkout code
uses: actions/checkout@v3
- name: Set up Python 3.11
uses: actions/setup-python@v4
with:
python-version: '3.11'
- name: Install dependencies
 run: |
What's in this workflow:
• Job 1 (Lint): Check code quality with flake8 (from Exercise 05)
• Job 2 (Test): Run test suite with pytest (from Exercise 05)
• Job 3 (Build & Push): Build Docker image and push to ACR (added in this exercise)
 Teaching moment: This is a complete CI/CD pipeline! Code quality → Tests → Deployable artifact.
 python -m pip install --upgrade pip
 pip install -r app/files/requirements.txt
 pip install pytest pytest-flask
- name: Run tests with pytest
 run: |
 cd app/files
 pytest tests/ --verbose
 # Job 3: Build and push Docker image to Azure Container Registry
build-and-push:
name: Build and Push Docker Image
runs-on: ubuntu-latest
needs: test # Only run if tests pass
steps:
- name: Checkout code
uses: actions/checkout@v3
- name: Login to Azure Container Registry
 run: |
 echo "${{ secrets.ACR_PASSWORD }}" | docker login \
 ${{ secrets.ACR_REGISTRY_URL }} \
 --username ${{ secrets.ACR_USERNAME }} \
 --password-stdin
- name: Build Docker image
 run: |
 cd app
 docker build \
 -t ${{ secrets.ACR_REGISTRY_URL }}/<< dpritipal >>:${{ github.sha }} \
 -t ${{ secrets.ACR_REGISTRY_URL }}/<< dpritipal >>:latest \
 .
- name: Push Docker image to ACR
 run: |
 docker push ${{ secrets.ACR_REGISTRY_URL }}/<< dpritipal >>:${{ github.sha }}
 docker push ${{ secrets.ACR_REGISTRY_URL }}/<< dpritipal >>:latest
- name: Image published
 run: |
 echo " Docker image published to ACR!"
 echo "Image: ${{ secrets.ACR_REGISTRY_URL }}/<< dpritipal >>:${{ github.sha }}"
